<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background: black;\n            color: white;\n            margin: 0;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id=\"pongCanvas\" width=\"800\" height=\"400\"></canvas>\n    <script>\n        const canvas = document.getElementById('pongCanvas');\n        const context = canvas.getContext('2d');\n\n        // Create the pong paddle\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n\n        const player = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0,\n        };\n\n        const computer = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            score: 0,\n        };\n\n        // Create the pong ball\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            radius: 10,\n            speed: 4,\n            velocityX: 4,\n            velocityY: 4,\n            color: 'white',\n        };\n\n        // Draw everything\n        function draw() {\n            // Clear the canvas\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw the paddles\n            context.fillStyle = player.color;\n            context.fillRect(player.x, player.y, player.width, player.height);\n            context.fillStyle = computer.color;\n            context.fillRect(computer.x, computer.y, computer.width, computer.height);\n            // Draw the ball\n            context.fillStyle = ball.color;\n            context.beginPath();\n            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);\n            context.closePath();\n            context.fill();\n        }\n\n        // Move the paddles\n        function movePaddle(event) {\n            switch(event.key) {\n                case 'ArrowUp':\n                    player.y -= 20;\n                    break;\n                case 'ArrowDown':\n                    player.y += 20;\n                    break;\n            }\n        }\n\n        // Update game logic\n        function update() {\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n\n            // Ball collision with the top and bottom walls\n            if(ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n\n            // Ball collision with paddles\n            if(ball.x - ball.radius < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {\n                ball.velocityX = -ball.velocityX;\n            }\n            if(ball.x + ball.radius > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height) {\n                ball.velocityX = -ball.velocityX;\n            }\n\n            // Score update\n            if(ball.x - ball.radius < 0) {\n                computer.score++;\n                resetBall();\n            } else if(ball.x + ball.radius > canvas.width) {\n                player.score++;\n                resetBall();\n            }\n\n            // Simple AI for the computer paddle\n            computer.y += (ball.y - (computer.y + computer.height / 2)) * 0.1;\n        }\n\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n\n        // Main game loop\n        function game() {\n            draw();\n            update();\n        }\n\n        document.addEventListener('keydown', movePaddle);\n        setInterval(game, 1000 / 60); // 60 frames per second\n    </script>\n</body>\n</html>\n
