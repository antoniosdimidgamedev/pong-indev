<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            margin: 0;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        // Create the pong paddle and ball\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n\n        let player1 = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            dy: 0,\n            score: 0\n        };\n\n        let player2 = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            dy: 0,\n            score: 0\n        };\n\n        let ball = {\n            x: canvas.width / 2 - ballSize / 2,\n            y: canvas.height / 2 - ballSize / 2,\n            size: ballSize,\n            speed: 4,\n            dx: 4,\n            dy: 4,\n            color: 'white'\n        };\n\n        // Move paddles\n        document.addEventListener('keydown', (event) => {\n            switch (event.key) {\n                case 'ArrowUp':\n                    player2.dy = -5;\n                    break;\n                case 'ArrowDown':\n                    player2.dy = 5;\n                    break;\n                case 'w':\n                    player1.dy = -5;\n                    break;\n                case 's':\n                    player1.dy = 5;\n                    break;\n            }\n        });\n\n        document.addEventListener('keyup', (event) => {\n            switch (event.key) {\n                case 'ArrowUp':\n                case 'ArrowDown':\n                    player2.dy = 0;\n                    break;\n                case 'w':\n                case 's':\n                    player1.dy = 0;\n                    break;\n            }\n        });\n\n        // Update game\n        function update() {\n            // Move paddles\n            player1.y += player1.dy;\n            player2.y += player2.dy;\n\n            // Boundary checking for paddles\n            if (player1.y < 0) player1.y = 0;\n            if (player1.y + player1.height > canvas.height) player1.y = canvas.height - player1.height;\n            if (player2.y < 0) player2.y = 0;\n            if (player2.y + player2.height > canvas.height) player2.y = canvas.height - player2.height;\n\n            // Move ball\n            ball.x += ball.dx;\n            ball.y += ball.dy;\n\n            // Ball collision with top and bottom walls\n            if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {\n                ball.dy *= -1;\n            }\n\n            // Ball collision with paddles\n            if (ball.x <= player1.x + player1.width && ball.y + ball.size >= player1.y && ball.y <= player1.y + player1.height) {\n                ball.dx *= -1;\n            }\n            if (ball.x + ball.size >= player2.x && ball.y + ball.size >= player2.y && ball.y <= player2.y + player2.height) {\n                ball.dx *= -1;\n            }\n\n            // Score update\n            if (ball.x < 0) {\n                player2.score++;\n                resetBall();\n            }\n            if (ball.x > canvas.width) {\n                player1.score++;\n                resetBall();\n            }\n        }\n\n        // Reset ball position\n        function resetBall() {\n            ball.x = canvas.width / 2 - ball.size / 2;\n            ball.y = canvas.height / 2 - ball.size / 2;\n            ball.dx = -ball.dx;\n            ball.speed = 4;\n        }\n\n        // Draw everything\n        function draw() {\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            context.fillStyle = player1.color;\n            context.fillRect(player1.x, player1.y, player1.width, player1.height);\n            context.fillStyle = player2.color;\n            context.fillRect(player2.x, player2.y, player2.width, player2.height);\n            context.fillStyle = ball.color;\n            context.fillRect(ball.x, ball.y, ball.size, ball.size);\n            context.font = '20px Arial';\n            context.fillText(player1.score, canvas.width / 4, canvas.height / 5);\n            context.fillText(player2.score, 3 * canvas.width / 4, canvas.height / 5);\n        }\n\n        // Main loop\n        function gameLoop() {\n            update();\n            draw();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    </script>\n</body>\n</html>
